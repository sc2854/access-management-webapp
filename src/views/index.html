<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Application Access Management</h1>
    
    <h2>Create New Access Request</h2>
    <form id="createAccessForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <button type="submit">Submit Request</button>
    </form>

    <h2>Revoke Access</h2>
    <form id="revokeAccessForm">
        <label for="revokeUsername">Username:</label>
        <input type="text" id="revokeUsername" name="revokeUsername" required>
        <button type="submit">Revoke Access</button>
    </form>

    <h2>Change Access Permission</h2>
    <form id="changePermissionForm">
        <label for="changeUsername">Username:</label>
        <input type="text" id="changeUsername" name="changeUsername" required>
        <label for="newPermission">New Permission Level:</label>
        <input type="text" id="newPermission" name="newPermission" required>
        <button type="submit">Change Permission</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
